<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./images/favicon-32x32.png"
		/>
		<title>Interactive rating component</title>
		<link rel="stylesheet" href="./styles.css" />
		<style></style>
	</head>
	<body>
		<!-- Rating state start -->
		<main>
			<div class="container">
				<div class="img">
					<img src="./assets/images/icon-star.svg" alt="star" />
				</div>
        <h1>How did we do?</h1>
				<p>
					Please let us know how we did with your support
					request. All feedback is appreciated to help us improve our offering!
				</p>
				<form action="submit.html?rating=<value>">
					<div class="options">
						<input type="radio" value="1" name="rating" id="one" />
						<label for="one"> 1 </label>
						<input type="radio" value="2" name="rating" id="two" />
						<label for="two"> 2 </label>
						<input type="radio" value="3" name="rating" id="three" />
						<label for="three"> 3 </label>
						<input type="radio" value="4" name="rating" id="four" />
						<label for="four"> 4 </label>
						<input type="radio" value="5" name="rating" id="five" />
						<label for="five"> 5 </label>
					</div>
					<button type="submit">Submit</button>
				</form>
				<!-- Rating state end -->
			</div>
		</main>
	</body>
</html>
